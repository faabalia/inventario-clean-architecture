version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: inventario-db
    environment:
      POSTGRES_USER: inventario_user
      POSTGRES_PASSWORD: inventario_password
      POSTGRES_DB: inventario_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: